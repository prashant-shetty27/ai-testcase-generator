<!DOCTYPE html>
<html>
<head>
    <title>Sign in - AI Testcase Generator</title>
    <style>
        :root {
            --bg-a: #f5f2e8;
            --bg-b: #fffaf0;
            --panel: #ffffff;
            --ink: #1f2630;
            --muted: #5d6b7b;
            --accent: #145da0;
            --accent-2: #0f4c81;
            --border: #d9e2ea;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Trebuchet MS", Verdana, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, #fff3cf 0%, transparent 30%),
                radial-gradient(circle at 85% 0%, #d8ebff 0%, transparent 35%),
                linear-gradient(160deg, var(--bg-a), var(--bg-b));
            padding: 18px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 14px 30px rgba(20, 40, 60, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 26px;
        }

        p {
            margin: 0 0 16px;
            color: var(--muted);
            line-height: 1.45;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 0;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            background: var(--accent);
            text-decoration: none;
        }

        .btn:hover { background: var(--accent-2); }

        .warn {
            margin-top: 12px;
            color: #9a2f1a;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>AI Testcase Generator</h1>
        <p>Sign in with Slack to access testcase generation, downloads, and run logs.</p>
        {% if slack_configured %}
            <a class="btn" href="/auth/slack/login">Sign in with Slack</a>
        {% else %}
            <p class="warn">Slack SSO is not configured on this environment.</p>
        {% endif %}
    </main>
</body>
</html>
