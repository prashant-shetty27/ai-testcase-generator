services:
  - type: web
    name: ai-testcase-generator
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads
