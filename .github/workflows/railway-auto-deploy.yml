name: Railway Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: railway-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Validate required secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing GitHub secret: RAILWAY_TOKEN"
            exit 1
          fi
          if [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "Missing GitHub secret: RAILWAY_SERVICE_ID"
            exit 1
          fi

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          ARGS="--service $RAILWAY_SERVICE_ID --detach"
          if [ -n "$RAILWAY_ENVIRONMENT_ID" ]; then
            ARGS="$ARGS --environment $RAILWAY_ENVIRONMENT_ID"
          fi
          railway up $ARGS
